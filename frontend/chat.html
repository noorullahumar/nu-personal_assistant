<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NU AI Chat - Your Personal Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Keep all existing styles - same as before */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #24243e 100%);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        .chat-interface {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(0);
            transition: transform 0.3s ease;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar.closed {
            transform: translateX(-280px);
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .new-chat-btn {
            flex: 1;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .toggle-sidebar {
            background: none;
            border: none;
            color: #a0a0c0;
            cursor: pointer;
            padding: 0.5rem;
            margin-left: 0.5rem;
            font-size: 1rem;
            transition: transform 0.3s;
        }

        .toggle-sidebar:hover {
            color: #667eea;
            transform: scale(1.1);
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.05);
        }

        .conversation-item:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .conversation-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .conversation-preview {
            flex: 1;
            font-size: 0.875rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-conv-btn {
            background: none;
            border: none;
            color: #a0a0c0;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: all 0.3s;
            font-size: 0.875rem;
            opacity: 0.6;
        }

        .delete-conv-btn:hover {
            opacity: 1;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.2);
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-info:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .user-email {
            font-size: 0.75rem;
            color: #a0a0c0;
        }

        .dropdown-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.3s;
        }

        .dropdown-btn:hover {
            color: #667eea;
            transform: scale(1.1);
        }

        .dropdown-menu {
            position: absolute;
            bottom: 100%;
            right: 0;
            background: #1a1a3e;
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 150px;
            display: none;
            margin-bottom: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dropdown-menu a {
            display: block;
            padding: 0.5rem 1rem;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s;
            border-radius: 8px;
            cursor: pointer;
        }

        .dropdown-menu a:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .main-chat {
            flex: 1;
            margin-left: 280px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: margin-left 0.3s ease;
        }

        .sidebar.closed~.main-chat {
            margin-left: 0;
        }

        .open-sidebar-btn {
            position: fixed;
            left: 20px;
            top: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            color: white;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            z-index: 99;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .open-sidebar-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .sidebar.closed~.open-sidebar-btn {
            display: flex;
        }

        .chat-header {
            padding: 1rem 2rem;
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s;
            display: block;
        }

        .menu-toggle:hover {
            color: #667eea;
            transform: scale(1.1);
        }

        .chat-header h2 {
            font-size: 1.25rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message-wrapper {
            display: flex;
            gap: 1rem;
            animation: messageSlideIn 0.3s ease-out;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-wrapper.user-message-wrapper {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-avatar.default {
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
        }

        .message-content-wrapper {
            max-width: 70%;
        }

        .message-bubble {
            padding: 0.75rem 1rem;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.9375rem;
        }

        .user-message-wrapper .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-bottom-right-radius: 4px;
        }

        .assistant-message-wrapper .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            color: #a0a0c0;
            margin-top: 0.25rem;
            padding: 0 0.5rem;
        }

        .user-message-wrapper .message-time {
            text-align: right;
        }

        .typing-indicator-wrapper {
            display: flex;
            gap: 1rem;
            animation: messageSlideIn 0.3s ease-out;
        }

        .typing-indicator-bubble {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #a0a0c0;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-8px);
            }
        }

        .input-area {
            padding: 1rem 2rem;
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-container {
            display: flex;
            gap: 0.75rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .user-input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .user-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .send-btn {
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #a0a0c0;
            padding: 2rem;
        }

        .back-home {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            cursor: pointer;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .back-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a3e;
            border-radius: 20px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .modal-content h3 {
            margin-bottom: 1rem;
            color: #667eea;
        }

        .modal-content input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-buttons button {
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 1000;
            animation: slideInUp 0.3s ease;
            text-align: center;
            font-size: 0.875rem;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main-chat {
                margin-left: 0;
            }

            .message-content-wrapper {
                max-width: 85%;
            }

            .chat-header {
                padding: 1rem;
            }

            .back-home {
                bottom: 20px;
                right: 20px;
                left: auto;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- Back to Home Button -->
    <div class="back-home" onclick="window.location.href='index.html'">
        <i class="fas fa-home"></i> Back to Home
    </div>

    <!-- Open Sidebar Button (appears when sidebar is closed) -->
    <button class="open-sidebar-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Chat Interface -->
    <div id="chat-interface" class="chat-interface">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewConversation()">
                    <i class="fas fa-plus"></i> New Chat
                </button>
                <button class="toggle-sidebar" onclick="toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            <div class="conversations-list" id="conversations-list">
                <div class="loading">Loading conversations...</div>
            </div>
            <div class="sidebar-footer">
                <div class="user-info" onclick="toggleDropdown()">
                    <div class="user-avatar-small" id="sidebar-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name" id="sidebar-name">User</div>
                        <div class="user-email" id="sidebar-email">user@example.com</div>
                    </div>
                    <button class="dropdown-btn">
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdown-menu">
                        <a href="#" onclick="openChangePasswordModal()">
                            <i class="fas fa-key"></i> Change Password
                        </a>
                        <a href="#" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h2><i class="fas fa-robot"></i> NU AI Assistant</h2>
            </div>

            <div class="chat-window" id="chat-window">
                <div class="loading">Select a conversation or start a new chat</div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <input type="text" class="user-input" id="user-input" placeholder="Ask me anything..."
                        onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal" id="password-modal">
        <div class="modal-content">
            <h3><i class="fas fa-key"></i> Change Password</h3>
            <div id="password-modal-message"
                style="background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.5); border-radius:8px; padding:0.75rem; margin-bottom:1rem; display:none;">
            </div>
            <form onsubmit="handleChangePassword(event)">
                <input type="password" id="current-password" placeholder="Current Password" required>
                <input type="password" id="new-password" placeholder="New Password (min 6 chars)" required>
                <input type="password" id="confirm-new-password" placeholder="Confirm New Password" required>
                <div class="modal-buttons">
                    <button type="submit" style="background: #667eea; color: white;">Update</button>
                    <button type="button" onclick="closePasswordModal()"
                        style="background: rgba(255,255,255,0.1); color: white;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

<script src="/js/chat.js"></script>
</body>

</html>
