<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NU AI Chat - Your Personal Assistant</title>
    <!-- REMOVED problematic meta headers - these should be set on server -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #24243e 100%);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        /* Login Page Styles */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #24243e 100%);
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 3rem;
            animation: rotateSlow 10s linear infinite;
        }

        @keyframes rotateSlow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            border-radius: 8px;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .auth-btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.875rem;
            color: #f87171;
            display: none;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.875rem;
            color: #10b981;
            display: none;
        }

        /* Chat Interface Styles */
        .chat-interface {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(0);
            transition: transform 0.3s ease;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar.collapsed {
            transform: translateX(-280px);
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .new-chat-btn {
            flex: 1;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .toggle-sidebar {
            background: none;
            border: none;
            color: #a0a0c0;
            cursor: pointer;
            padding: 0.5rem;
            margin-left: 0.5rem;
            font-size: 1rem;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.05);
        }

        .conversation-item:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .conversation-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .conversation-preview {
            flex: 1;
            font-size: 0.875rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-conv-btn {
            background: none;
            border: none;
            color: #a0a0c0;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: all 0.3s;
            font-size: 0.875rem;
        }

        .delete-conv-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .user-email {
            font-size: 0.75rem;
            color: #a0a0c0;
        }

        .dropdown-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
        }

        .dropdown-menu {
            position: absolute;
            bottom: 100%;
            right: 0;
            background: #1a1a3e;
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 150px;
            display: none;
            margin-bottom: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dropdown-menu a {
            display: block;
            padding: 0.5rem 1rem;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s;
            border-radius: 8px;
        }

        .dropdown-menu a:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            margin-left: 280px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: margin-left 0.3s ease;
        }

        .sidebar.collapsed~.main-chat {
            margin-left: 0;
        }

        .chat-header {
            padding: 1rem 2rem;
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: none;
        }

        .chat-header h2 {
            font-size: 1.25rem;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-email {
            color: #a0a0c0;
            font-size: 0.875rem;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: #f87171;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Chat Messages */
        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Message Styles with Avatars */
        .message-wrapper {
            display: flex;
            gap: 1rem;
            animation: messageSlideIn 0.3s ease-out;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-wrapper.user-message-wrapper {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-avatar.default {
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
        }

        .message-content-wrapper {
            max-width: 70%;
        }

        .message-bubble {
            padding: 0.75rem 1rem;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.9375rem;
        }

        .user-message-wrapper .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-bottom-right-radius: 4px;
        }

        .assistant-message-wrapper .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            color: #a0a0c0;
            margin-top: 0.25rem;
            padding: 0 0.5rem;
        }

        .user-message-wrapper .message-time {
            text-align: right;
        }

        /* Typing Indicator */
        .typing-indicator-wrapper {
            display: flex;
            gap: 1rem;
            animation: messageSlideIn 0.3s ease-out;
        }

        .typing-indicator-bubble {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #a0a0c0;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-8px);
            }
        }

        /* Input Area */
        .input-area {
            padding: 1rem 2rem;
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-container {
            display: flex;
            gap: 0.75rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .user-input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .user-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .send-btn {
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a3e;
            border-radius: 20px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-content h3 {
            margin-bottom: 1rem;
        }

        .modal-content input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-buttons button {
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading {
            text-align: center;
            color: #a0a0c0;
            padding: 2rem;
        }

        /* Back to Home Button */
        .back-home {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .back-home:hover {
            background: #2d3748;
            color: white;
            border-color: #667eea;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-280px);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-chat {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }

            .message-content-wrapper {
                max-width: 85%;
            }

            .chat-header {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Back to Home Button -->
    <div class="back-home" onclick="window.location.href='index.html'">
        ← Back to Home
    </div>

    <!-- Login Page -->
    <div id="login-page" class="login-page">
        <div class="auth-container">
            <div class="logo">
                <span class="logo-icon">🧠</span>
                <span class="logo-text">NU AI</span>
            </div>

            <div class="tabs">
                <div class="tab active" id="login-tab" onclick="switchTab('login')">Login</div>
                <div class="tab" id="register-tab" onclick="switchTab('register')">Sign Up</div>
            </div>

            <div id="auth-error" class="error-message"></div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <input type="email" id="login-email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-btn">Login →</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display: none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <input type="text" id="register-username" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="register-email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="register-password"
                        placeholder="Password (min 8 chars, 1 uppercase, 1 number, 1 special)" required>
                </div>
                <button type="submit" class="auth-btn">Create Account →</button>
            </form>
        </div>
    </div>

    <!-- Chat Interface -->
    <div id="chat-interface" class="chat-interface">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewConversation()">
                    <i class="fas fa-plus"></i> New Chat
                </button>
                <button class="toggle-sidebar" onclick="toggleSidebar()">◀</button>
            </div>
            <div class="conversations-list" id="conversations-list">
                <div class="loading">Loading conversations...</div>
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar-small" id="sidebar-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name" id="sidebar-name">User</div>
                        <div class="user-email" id="sidebar-email">user@example.com</div>
                    </div>
                    <button class="dropdown-btn" onclick="toggleDropdown()">▼</button>
                    <div class="dropdown-menu" id="dropdown-menu">
                        <a href="#" onclick="openChangePasswordModal()">🔒 Change Password</a>
                        <a href="#" onclick="logout()">🚪 Logout</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <h2>NU AI Assistant</h2>
                <div class="user-menu">
                    <span class="user-email" id="user-email"></span>
                </div>
            </div>

            <div class="chat-window" id="chat-window">
                <div class="loading">Select a conversation or start a new chat</div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <input type="text" class="user-input" id="user-input" placeholder="Ask me anything..."
                        onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal" id="password-modal">
        <div class="modal-content">
            <h3>Change Password</h3>
            <div id="password-modal-message" class="error-message"></div>
            <form onsubmit="handleChangePassword(event)">
                <input type="password" id="current-password" placeholder="Current Password" required>
                <input type="password" id="new-password" placeholder="New Password (min 6 chars)" required>
                <input type="password" id="confirm-new-password" placeholder="Confirm New Password" required>
                <div class="modal-buttons">
                    <button type="submit" style="background: #667eea; color: white;">Update</button>
                    <button type="button" onclick="closePasswordModal()"
                        style="background: rgba(255,255,255,0.1); color: white;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        // FIXED: Define API_URLS properly
        const API_URLS = ["http://127.0.0.1:8000"];
        let API_BASE_URL = API_URLS[0];

        if (window.location.hostname.includes('onrender.com')) {
            localStorage.setItem('api_url', API_URLS[0]);
        }

        let token = localStorage.getItem('token');
        let currentUser = null;
        let currentConversation = null;
        let conversations = [];
        let touchStartX = 0;
        let touchEndX = 0;

        // Profile Images - CHANGE THIS TO YOUR IMAGE URL
        const ASSISTANT_AVATAR_URL = "./noorullahumar_profile.png";

        // ========== SWIPE TO DELETE ==========
        function addSwipeToDelete() {
            const conversationItems = document.querySelectorAll('.conversation-item');
            conversationItems.forEach(item => {
                item.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                });
                item.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    const diff = touchEndX - touchStartX;
                    if (diff < -50) {
                        const deleteBtn = item.querySelector('.delete-conv-btn');
                        if (deleteBtn) deleteBtn.click();
                    }
                });
            });
        }

        // ========== CONNECTION TESTING ==========
        async function testConnection() {
            console.log('🔍 Testing connections...');
            for (const url of API_URLS) {
                try {
                    const response = await fetch(`${url}/health`, {
                        method: 'GET', mode: 'cors', cache: 'no-cache',
                        headers: { 'Accept': 'application/json' }
                    });
                    if (response.ok) {
                        API_BASE_URL = url;
                        localStorage.setItem('api_url', url);
                        console.log('✅ Connected to:', url);
                        return true;
                    }
                } catch (error) {
                    console.log(`Failed to connect to ${url}:`, error.message);
                }
            }
            console.error('❌ Could not connect to any backend');
            return false;
        }

        // ========== INITIALIZATION ==========
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Chat page loaded');
            
            const connected = await testConnection();
            if (!connected) {
                const errorDiv = document.getElementById('auth-error');
                if (errorDiv) {
                    errorDiv.textContent = 'Cannot connect to backend server. Please make sure it\'s running on port 8000.';
                    errorDiv.style.display = 'block';
                }
                return;
            }

            if (token) {
                console.log('Token found, verifying...');
                await verifyToken();
            }
            setupEventListeners();
        });

        function setupEventListeners() {
            const input = document.getElementById('user-input');
            if (input) input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        }

        // ========== AUTHENTICATION ==========
        function switchTab(tab) {
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.style.display = 'block';
                loginForm.style.display = 'none';
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('auth-error');
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;

            submitBtn.textContent = 'Logging in...';
            submitBtn.disabled = true;
            errorDiv.style.display = 'none';
            errorDiv.className = 'error-message';

            try {
                console.log('Attempting login for:', email);
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    token = data.access_token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    console.log('Login successful for:', currentUser?.email);
                    showChatInterface();
                    await loadConversations();
                } else {
                    errorDiv.textContent = data.detail || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'Cannot connect to server. Make sure backend is running on port 8000';
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('register-username').value.trim();
            const email = document.getElementById('register-email').value.trim().toLowerCase();
            const password = document.getElementById('register-password').value;
            const errorDiv = document.getElementById('auth-error');
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;

            errorDiv.style.display = 'none';
            submitBtn.textContent = 'Registering...';
            submitBtn.disabled = true;

            if (username.length < 3) {
                errorDiv.textContent = 'Username must be at least 3 characters';
                errorDiv.style.display = 'block';
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
                return;
            }

            if (password.length < 8) {
                errorDiv.textContent = 'Password must be at least 8 characters';
                errorDiv.style.display = 'block';
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    errorDiv.className = 'success-message';
                    errorDiv.textContent = '✅ Registration successful! Please login to continue.';
                    errorDiv.style.display = 'block';

                    document.getElementById('register-username').value = '';
                    document.getElementById('register-email').value = '';
                    document.getElementById('register-password').value = '';

                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('login-email').value = email;
                        errorDiv.style.display = 'none';
                        errorDiv.className = 'error-message';
                    }, 2000);

                } else {
                    errorDiv.className = 'error-message';
                    errorDiv.textContent = data.detail || 'Registration failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.className = 'error-message';
                errorDiv.textContent = 'Cannot connect to server';
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        }

        async function verifyToken() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    currentUser = await response.json();
                    console.log('Token verified for:', currentUser?.email);
                    showChatInterface();
                    await loadConversations();
                } else {
                    console.log('Token invalid, logging out');
                    logout();
                }
            } catch (error) {
                console.error('Token verification error:', error);
                logout();
            }
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            currentUser = null;
            currentConversation = null;
            conversations = [];
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('chat-interface').style.display = 'none';
        }

        function showChatInterface() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';
            document.getElementById('sidebar-name').textContent = currentUser?.username || currentUser?.email || 'User';
            document.getElementById('sidebar-email').textContent = currentUser?.email || '';
            document.getElementById('user-email').textContent = currentUser?.email || '';
            document.getElementById('sidebar-avatar').textContent = (currentUser?.username?.[0] || currentUser?.email?.[0] || 'U').toUpperCase();
        }

        // ========== CONVERSATION MANAGEMENT ==========
        async function loadConversations() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/conversations`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    conversations = await response.json();
                    renderConversations();
                    if (conversations.length > 0 && !currentConversation) {
                        await loadConversation(conversations[0].conversation_id);
                    }
                } else if (response.status === 401) {
                    logout();
                }
            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        }

        function renderConversations() {
            const container = document.getElementById('conversations-list');
            if (!container) return;

            if (conversations.length === 0) {
                container.innerHTML = '<div class="loading">No conversations yet</div>';
                return;
            }

            container.innerHTML = conversations.map(conv => `
                <div class="conversation-item ${currentConversation?.conversation_id === conv.conversation_id ? 'active' : ''}">
                    <div class="conversation-preview" onclick="loadConversation('${conv.conversation_id}')">
                        ${escapeHtml(conv.preview || 'Click to start chatting')}
                    </div>
                    <button class="delete-conv-btn" onclick="deleteConversation(event, '${conv.conversation_id}')" title="Delete conversation">🗑️</button>
                </div>
            `).join('');
            setTimeout(() => addSwipeToDelete(), 100);
        }

        async function deleteConversation(event, conversationId) {
            if (event) event.stopPropagation();
            if (!confirm('Delete this conversation?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/api/conversations/${conversationId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    conversations = conversations.filter(c => c.conversation_id !== conversationId);
                    if (currentConversation?.conversation_id === conversationId) {
                        currentConversation = null;
                        document.getElementById('chat-window').innerHTML = '<div class="loading">Conversation deleted. Start a new chat!</div>';
                    }
                    renderConversations();
                    if (conversations.length === 0) {
                        document.getElementById('chat-window').innerHTML = '<div class="loading">Start a new conversation!</div>';
                    } else if (!currentConversation) {
                        await loadConversation(conversations[0].conversation_id);
                    }
                    showToast('Conversation deleted', 'success');
                }
            } catch (error) {
                showToast('Error deleting conversation', 'error');
            }
        }

        async function loadConversation(conversationId) {
            const conversation = conversations.find(c => c.conversation_id === conversationId);
            if (!conversation) return;

            currentConversation = conversation;
            renderConversations();

            try {
                const response = await fetch(`${API_BASE_URL}/api/conversations/${conversationId}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const messages = await response.json();
                    renderMessages(messages);
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        async function createNewConversation() {
            try {
                console.log('Creating new conversation...');
                
                if (!token) {
                    console.error('No token found');
                    return false;
                }
                
                const response = await fetch(`${API_BASE_URL}/api/conversations/create`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });
                
                if (response.status === 401) {
                    logout();
                    return false;
                }
                
                if (!response.ok) {
                    console.error('Failed to create conversation:', response.status);
                    return false;
                }
                
                const data = await response.json();
                console.log('Conversation created:', data);
                
                const chatWindow = document.getElementById('chat-window');
                if (chatWindow) {
                    chatWindow.innerHTML = '<div class="loading">New conversation started. Start typing your message!</div>';
                }
                
                currentConversation = {
                    conversation_id: data.conversation_id,
                    title: data.title || 'New Conversation',
                    preview: 'New conversation'
                };
                
                conversations.unshift(currentConversation);
                renderConversations();
                scrollToBottom();
                
                const input = document.getElementById('user-input');
                if (input) input.focus();
                
                return true;
            } catch (error) {
                console.error('Error creating conversation:', error);
                return false;
            }
        }

        // ========== MESSAGE RENDERING WITH AVATARS ==========
        function renderMessages(messages) {
            const chatWindow = document.getElementById('chat-window');
            if (!chatWindow) return;

            chatWindow.innerHTML = '';

            if (!messages || messages.length === 0) {
                chatWindow.innerHTML = '<div class="loading">No messages yet. Start chatting!</div>';
                return;
            }

            messages.forEach(msg => {
                if (msg.role === 'user') {
                    addUserMessageToUI(msg.content, false);
                } else {
                    addAssistantMessageToUI(msg.content, false);
                }
            });

            scrollToBottom();
        }

        function addUserMessageToUI(content, save = true) {
            const chatWindow = document.getElementById('chat-window');
            if (!chatWindow) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper user-message-wrapper';

            const contentWrapper = document.createElement('div');
            contentWrapper.className = 'message-content-wrapper';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            contentWrapper.appendChild(bubble);
            contentWrapper.appendChild(time);

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar default';
            avatar.textContent = (currentUser?.username?.[0] || currentUser?.email?.[0] || 'U').toUpperCase();

            wrapper.appendChild(avatar);
            wrapper.appendChild(contentWrapper);
            chatWindow.appendChild(wrapper);
            scrollToBottom();
        }

        function addAssistantMessageToUI(content, save = true) {
            const chatWindow = document.getElementById('chat-window');
            if (!chatWindow) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper assistant-message-wrapper';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = `<img src="${ASSISTANT_AVATAR_URL}" alt="NU AI" onerror="this.src='https://randomuser.me/api/portraits/men/32.jpg'">`;

            const contentWrapper = document.createElement('div');
            contentWrapper.className = 'message-content-wrapper';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            contentWrapper.appendChild(bubble);
            contentWrapper.appendChild(time);

            wrapper.appendChild(avatar);
            wrapper.appendChild(contentWrapper);
            chatWindow.appendChild(wrapper);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const chatWindow = document.getElementById('chat-window');
            if (!chatWindow) return;

            const typingWrapper = document.createElement('div');
            typingWrapper.className = 'typing-indicator-wrapper';
            typingWrapper.id = 'typing-indicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = `<img src="${ASSISTANT_AVATAR_URL}" alt="NU AI">`;

            const bubbleWrapper = document.createElement('div');
            bubbleWrapper.className = 'message-content-wrapper';

            const bubble = document.createElement('div');
            bubble.className = 'typing-indicator-bubble';
            bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';

            bubbleWrapper.appendChild(bubble);
            typingWrapper.appendChild(avatar);
            typingWrapper.appendChild(bubbleWrapper);
            chatWindow.appendChild(typingWrapper);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // ========== SEND MESSAGE - FIXED ==========
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) {
                console.log('Empty message');
                return;
            }

            if (!currentConversation) {
                console.log('No conversation, creating one...');
                const created = await createNewConversation();
                if (!created) {
                    alert('Failed to create conversation');
                    return;
                }
                setTimeout(() => sendMessage(), 500);
                return;
            }

            const chatWindow = document.getElementById('chat-window');
            if (chatWindow.children.length === 1 && chatWindow.children[0]?.classList.contains('loading')) {
                chatWindow.innerHTML = '';
            }

            addUserMessageToUI(message, false);
            input.value = '';
            showTypingIndicator();

            try {
                console.log('Sending message to API:', message);
                
                const response = await fetch(`${API_BASE_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: message,
                        conversation_id: currentConversation.conversation_id
                    })
                });

                removeTypingIndicator();

                if (response.status === 401) {
                    console.log('Unauthorized, logging out');
                    logout();
                    return;
                }

                if (response.ok) {
                    const data = await response.json();
                    console.log('Response received:', data.reply?.substring(0, 100));
                    addAssistantMessageToUI(data.reply, false);
                    await updateConversationPreviewOnly();
                } else {
                    const errorText = await response.text();
                    console.error('API error:', errorText);
                    addAssistantMessageToUI('Error: Failed to get response from server. Please try again.', false);
                }
            } catch (error) {
                console.error('Send message error:', error);
                removeTypingIndicator();
                addAssistantMessageToUI(`Error: ${error.message}. Please check if backend is running.`, false);
            }

            scrollToBottom();
        }

        async function updateConversationPreviewOnly() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/conversations`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const updatedConversations = await response.json();
                    conversations = updatedConversations;
                    renderConversations();
                }
            } catch (error) {
                console.error('Error updating conversations:', error);
            }
        }

        function scrollToBottom() {
            const chatWindow = document.getElementById('chat-window');
            if (chatWindow) chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        // ========== UTILITY FUNCTIONS ==========
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.backgroundColor = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        function toggleDropdown() {
            const dropdown = document.getElementById('dropdown-menu');
            dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
        }

        document.addEventListener('click', function (event) {
            const dropdown = document.getElementById('dropdown-menu');
            const dropdownBtn = document.querySelector('.dropdown-btn');
            if (dropdown && dropdownBtn && !dropdownBtn.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.style.display = 'none';
            }
        });

        // Password Modal Functions
        function openChangePasswordModal() {
            document.getElementById('password-modal').style.display = 'flex';
            toggleDropdown();
            document.getElementById('current-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-new-password').value = '';
            const messageDiv = document.getElementById('password-modal-message');
            messageDiv.style.display = 'none';
            messageDiv.textContent = '';
        }

        function closePasswordModal() {
            document.getElementById('password-modal').style.display = 'none';
        }

        async function handleChangePassword(event) {
            event.preventDefault();
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-new-password').value;
            const messageDiv = document.getElementById('password-modal-message');

            if (newPassword !== confirmPassword) {
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'Passwords do not match';
                messageDiv.style.display = 'block';
                return;
            }

            if (newPassword.length < 6) {
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'Password must be at least 6 characters';
                messageDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/change-password`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: currentPassword, new_password: newPassword })
                });

                const data = await response.json();
                if (response.ok) {
                    messageDiv.className = 'success-message';
                    messageDiv.textContent = 'Password changed successfully!';
                    messageDiv.style.display = 'block';
                    setTimeout(() => closePasswordModal(), 2000);
                } else {
                    messageDiv.className = 'error-message';
                    messageDiv.textContent = data.detail || 'Failed to change password';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'Connection error';
                messageDiv.style.display = 'block';
            }
        }

        // Global exports
        window.switchTab = switchTab;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.logout = logout;
        window.loadConversation = loadConversation;
        window.createNewConversation = createNewConversation;
        window.sendMessage = sendMessage;
        window.toggleSidebar = toggleSidebar;
        window.toggleDropdown = toggleDropdown;
        window.openChangePasswordModal = openChangePasswordModal;
        window.closePasswordModal = closePasswordModal;
        window.handleChangePassword = handleChangePassword;
        window.deleteConversation = deleteConversation;
        window.handleKeyPress = handleKeyPress;
    </script>
</body>

</html>
