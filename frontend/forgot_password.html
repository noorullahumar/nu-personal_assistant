<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }

        h2 {
            color: #3b82f6;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #2d3748;
            border: 1px solid #4b5563;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #10b981;
            color: white;
            display: block;
        }

        .message.error {
            background: #ef4444;
            color: white;
            display: block;
        }

        .message.info {
            background: #3b82f6;
            color: white;
            display: block;
        }

        .reset-link-box {
            background: #2d3748;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
            color: #fbbf24;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #3b82f6;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .dev-note {
            margin-top: 20px;
            padding: 15px;
            background: #2d3748;
            border-radius: 8px;
            font-size: 13px;
            color: #fbbf24;
            border-left: 3px solid #fbbf24;
        }

        .debug-info {
            margin-top: 20px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 4px;
            font-size: 12px;
            color: #888;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Forgot Password</h2>
            <div class="subtitle">Enter your email to generate a reset link</div>
            
            <div id="message" class="message"></div>
            <div id="resetLink" class="reset-link-box" style="display: none;"></div>
            
            <form id="forgotForm" onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="your@email.com" value="noorullahumar12@gmail.com">
                </div>
                
                <button type="submit" class="btn-primary" id="submit-btn">Generate Reset Link</button>
            </form>
            
            <div class="login-link">
                <a href="index.html">← Back to Login</a>
            </div>

            <div id="debug" class="debug-info"></div>
        </div>
    </div>

    <script>
        async function handleForgotPassword(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.textContent;
            const messageDiv = document.getElementById('message');
            
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;
            messageDiv.style.display = 'none';
            
            try {
                console.log('Sending forgot password request for:', email);
                
                const response = await fetch('http://nu-ai-env.eba-ijpiuack.eu-north-1.elasticbeanstalk.com/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                messageDiv.className = data.success ? 'message success' : 'message error';
                messageDiv.textContent = data.message;
                messageDiv.style.display = 'block';
                
                if (data.success) {
                    document.getElementById('email').value = '';
                }
                
            } catch (error) {
                console.error('Error:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.style.display = 'block';
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
